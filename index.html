<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Finanças</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1B7A43" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Finanças" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F3FAF6;
    --surface-2:#E8F5EC;
    --border:#D8EAE0;
    --primary:#1B7A43;
    --primary-dark:#125C31;
    --accent:#34A65F;
    --ink:#15271C;
    --muted:#5E7568;
    --danger:#C1432B;
    --danger-soft:#FBEAE6;
    --warning:#C9871E;
    --warning-soft:#FBF1E1;
    --good-soft:#E7F5EC;
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);}
  body{-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  #app{display:flex;min-height:100vh;}

  /* ---- Sidebar / nav ---- */
  nav.rail{
    width:200px;flex:0 0 200px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:20px 12px;gap:2px;
  }
  .brand{font-family:var(--font-display);font-size:20px;color:var(--primary-dark);padding:6px 10px 18px;letter-spacing:0.2px;}
  .brand b{font-weight:700;}
  nav.rail button{
    display:flex;align-items:center;gap:10px;background:transparent;border:none;border-radius:10px;
    padding:10px 12px;font-size:14px;color:var(--muted);text-align:left;font-weight:600;
  }
  nav.rail button:hover{background:var(--surface-2);color:var(--ink);}
  nav.rail button.active{background:var(--primary);color:#fff;}
  nav.rail .ico{width:18px;text-align:center;font-size:15px;}

  main{flex:1;min-width:0;padding:28px 34px 100px;max-width:900px;}
  @media (max-width:820px){
    main{padding:18px 16px 90px;max-width:100%;}
    nav.rail{display:none;}
  }

  /* bottom tab bar for mobile */
  nav.tabbar{display:none;}
  @media (max-width:820px){
    nav.tabbar{
      display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);
      justify-content:space-around;padding:6px 2px;z-index:20;
    }
    nav.tabbar button{background:none;border:none;font-size:10px;color:var(--muted);font-weight:600;
      display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;flex:1;}
    nav.tabbar button .ico{font-size:16px;}
    nav.tabbar button.active{color:var(--primary);}
  }

  h1.page-title{font-family:var(--font-display);font-size:26px;margin:0 0 4px;color:var(--ink);}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:22px;}

  .grid{display:grid;gap:14px;}
  .grid.cols-2{grid-template-columns:1fr 1fr;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  @media (max-width:640px){ .grid.cols-2, .grid.cols-3{grid-template-columns:1fr 1fr;} }

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
  .card.tight{padding:12px 14px;}
  .card h3{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;}
  .money{font-family:var(--font-mono);font-weight:600;font-size:22px;color:var(--ink);}
  .money.sm{font-size:16px;}
  .money.neg{color:var(--danger);}
  .money.pos{color:var(--primary-dark);}

  .progress-outer{background:#fff;border:1px solid var(--border);border-radius:999px;height:8px;overflow:hidden;margin-top:8px;}
  .progress-inner{height:100%;background:var(--primary);border-radius:999px;transition:width .4s ease;}
  .progress-inner.warn{background:var(--warning);}
  .progress-inner.over{background:var(--danger);}

  /* jars - signature element */
  .jars{display:flex;gap:22px;justify-content:center;padding:14px 0 4px;flex-wrap:wrap;}
  .jar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;width:96px;}
  .jar-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  .jar-value{font-family:var(--font-mono);font-size:13px;color:var(--ink);font-weight:600;}
  svg.jar{overflow:visible;}
  .wave{animation:waveMove 6s linear infinite;}
  @keyframes waveMove{ from{transform:translateX(0);} to{transform:translateX(-60px);} }

  .btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-weight:700;font-size:14px;}
  .btn:hover{background:var(--primary-dark);}
  .btn.secondary{background:#fff;color:var(--primary-dark);border:1px solid var(--primary);}
  .btn.danger{background:var(--danger);}
  .btn.block{width:100%;}
  .btn.small{padding:7px 12px;font-size:12px;border-radius:8px;}

  label.field{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px;}
  label.field:first-child{margin-top:0;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;
    font-size:14px;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:6px;}

  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .list-item:last-child{border-bottom:none;}
  .list-item .meta{font-size:12px;color:var(--muted);}
  .empty{color:var(--muted);font-size:13px;padding:6px 0;}

  .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--good-soft);color:var(--primary-dark);}
  .tag.warn{background:var(--warning-soft);color:var(--warning);}
  .tag.danger{background:var(--danger-soft);color:var(--danger);}

  .insight{display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border);font-size:13.5px;}
  .insight:last-child{border-bottom:none;}
  .insight .dot{color:var(--accent);font-weight:900;}

  table.cfg{width:100%;border-collapse:collapse;}
  table.cfg th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;padding:0 8px 8px 0;}
  table.cfg td{padding:6px 8px 6px 0;vertical-align:middle;}
  table.cfg input{padding:8px;}
  .icon-btn{background:none;border:none;color:var(--danger);font-size:16px;padding:4px 8px;}
  .add-row{margin-top:10px;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center;}
  .cal-dow{font-size:11px;color:var(--muted);font-weight:700;padding-bottom:4px;}
  .cal-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--surface-2);color:var(--muted);}
  .cal-day.empty-cell{background:transparent;}
  .cal-day.profit{background:var(--good-soft);color:var(--primary-dark);}
  .cal-day.loss{background:var(--danger-soft);color:var(--danger);}
  .cal-day.today{outline:2px solid var(--warning);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .swatch{width:9px;height:9px;border-radius:50%;display:inline-block;}

  pre.report{white-space:pre-wrap;font-family:var(--font-mono);font-size:12.5px;background:#fff;border:1px solid var(--border);
    border-radius:10px;padding:14px;line-height:1.6;color:var(--ink);}

  .bars{display:flex;align-items:flex-end;gap:5px;height:120px;padding-top:10px;}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .bar .fill{width:100%;border-radius:4px 4px 0 0;background:var(--primary);min-height:2px;}
  .bar .fill.neg{background:var(--danger);}
  .bar .lbl{font-size:9px;color:var(--muted);margin-top:4px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:50;}
  .toast.show{opacity:1;}
  @media (max-width:820px){ .toast{bottom:78px;} }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){

  /* ---------------- Storage ---------------- */
  const STORAGE_KEY = 'financas-app-data-v1';

  function defaultState(){
    return {
      goals: [{id:'g1', name:'Minha Meta', target:20000, saved_manual_offset:0}],
      activeGoalId: 'g1',
      potePercents: {meta:40, reserva:10, livre:50},
      categories: [
        {id:'c1', name:'Uber', cap:80},
        {id:'c2', name:'Delivery', cap:0},
        {id:'c3', name:'Vícios', cap:50},
        {id:'c4', name:'Namorada', cap:100},
        {id:'c5', name:'Amigos/Marmitas', cap:80},
        {id:'c6', name:'Cartão de crédito', cap:400},
        {id:'c7', name:'Outros', cap:0}
      ],
      paymentMethods: ['Dinheiro livre','Cartão de crédito','Pix','Dinheiro físico'],
      incomeEntries: [],
      expenseEntries: []
    };
  }

  let state = defaultState();
  let saveTimer = null;

  function scheduleSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>{
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }catch(e){ console.error('Falha ao salvar', e); showToast('Não consegui salvar agora. Tente de novo.'); }
    }, 250);
  }

  async function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        state = Object.assign(defaultState(), parsed);
      }
    }catch(e){
      // chave não existe ainda — mantém default
    }
    render();
  }

  /* ---------------- Helpers ---------------- */
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function fmt(n){
    n = Number(n)||0;
    return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
  }
  function monthKey(d){ return d.slice(0,7); }
  function activeGoal(){ return state.goals.find(g=>g.id===state.activeGoalId) || state.goals[0]; }

  function computeTotals(){
    let meta=0, reserva=0, livreIn=0;
    state.incomeEntries.forEach(e=>{
      meta += e.split.meta||0;
      reserva += e.split.reserva||0;
      livreIn += e.split.livre||0;
    });
    const gastoTotal = state.expenseEntries.reduce((s,e)=>s+Number(e.amount||0),0);
    const livre = livreIn - gastoTotal;
    return {meta, reserva, livre, total: meta+reserva+livre};
  }

  function monthExpenses(ym){
    return state.expenseEntries.filter(e=>monthKey(e.date)===ym);
  }
  function monthIncome(ym){
    return state.incomeEntries.filter(e=>monthKey(e.date)===ym);
  }

  function categorySpent(catId, ym){
    return monthExpenses(ym).filter(e=>e.category===catId).reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function avgSpendPerDay(ym){
    const exps = monthExpenses(ym);
    if(exps.length===0) return 0;
    const total = exps.reduce((s,e)=>s+Number(e.amount||0),0);
    const distinctDays = new Set(exps.map(e=>e.date)).size || 1;
    return total/distinctDays;
  }

  function streakNoAzul(){
    // percorre dias com QUALQUER lançamento, do mais recente pro mais antigo
    const daySet = {};
    state.incomeEntries.forEach(e=>{ daySet[e.date]=daySet[e.date]||{in:0,out:0}; daySet[e.date].in += e.split.livre||0; });
    state.expenseEntries.forEach(e=>{ daySet[e.date]=daySet[e.date]||{in:0,out:0}; daySet[e.date].out += Number(e.amount||0); });
    const days = Object.keys(daySet).sort().reverse();
    let streak = 0;
    for(const d of days){
      const net = daySet[d].in - daySet[d].out;
      if(net>=0) streak++; else break;
    }
    return streak;
  }

  function last14DaysData(){
    const arr = [];
    for(let i=13;i>=0;i--){
      const d = new Date(); d.setDate(d.getDate()-i);
      const iso = d.toISOString().slice(0,10);
      const inc = state.incomeEntries.filter(e=>e.date===iso).reduce((s,e)=>s+(e.split.livre||0),0);
      const out = state.expenseEntries.filter(e=>e.date===iso).reduce((s,e)=>s+Number(e.amount||0),0);
      arr.push({date:iso, net: inc-out});
    }
    return arr;
  }

  function buildInsights(){
    const ym = todayISO().slice(0,7);
    const out = [];
    state.categories.forEach(c=>{
      if(c.cap>0){
        const spent = categorySpent(c.id, ym);
        const pct = spent/c.cap;
        if(pct>=1) out.push({icon:'⚠️', text:`"${c.name}" já passou do teto do mês (${fmt(spent)} de ${fmt(c.cap)}).`});
        else if(pct>=0.8) out.push({icon:'👀', text:`"${c.name}" já consumiu ${(pct*100).toFixed(0)}% do teto do mês.`});
      }
    });
    // dia da semana com mais gasto
    const exps = state.expenseEntries;
    if(exps.length>=5){
      const byDow = [0,0,0,0,0,0,0];
      exps.forEach(e=>{ byDow[new Date(e.date+'T12:00:00').getDay()] += Number(e.amount||0); });
      const max = Math.max(...byDow);
      if(max>0){
        const idx = byDow.indexOf(max);
        const dows = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
        out.push({icon:'📅', text:`${dows[idx]} costuma ser o dia em que você mais gasta.`});
      }
    }
    // projeção de meta
    const g = activeGoal();
    const t = computeTotals();
    if(g && t.meta < g.target && state.incomeEntries.length>=3){
      const days = new Set(state.incomeEntries.map(e=>e.date)).size;
      const avgPerDay = t.meta/days;
      if(avgPerDay>0){
        const faltam = g.target - t.meta;
        const diasRestantes = Math.ceil(faltam/avgPerDay);
        const dt = new Date(); dt.setDate(dt.getDate()+diasRestantes);
        out.push({icon:'🎯', text:`No ritmo atual, você bate a meta "${g.name}" em cerca de ${diasRestantes} dias (por volta de ${dt.toLocaleDateString('pt-BR')}).`});
      }
    }
    if(out.length===0) out.push({icon:'💬', text:'Registre alguns lançamentos para eu começar a te dar sugestões personalizadas.'});
    return out;
  }

  /* ---------------- Render shell ---------------- */
  let activeTab = 'painel';
  const TABS = [
    {id:'painel', label:'Painel', ico:'◆'},
    {id:'lancar', label:'Lançar', ico:'＋'},
    {id:'graficos', label:'Gráficos', ico:'▤'},
    {id:'calendario', label:'Calendário', ico:'▦'},
    {id:'relatorio', label:'Relatório', ico:'▤'},
    {id:'config', label:'Config', ico:'⚙'}
  ];

  function render(){
    const app = document.getElementById('app');
    app.innerHTML = `
      <nav class="rail">
        <div class="brand"><b>Finanças</b></div>
        ${TABS.map(t=>`<button data-tab="${t.id}" class="${activeTab===t.id?'active':''}"><span class="ico">${t.ico}</span>${t.label}</button>`).join('')}
      </nav>
      <main id="main"></main>
      <nav class="tabbar">
        ${TABS.map(t=>`<button data-tab="${t.id}" class="${activeTab===t.id?'active':''}"><span class="ico">${t.ico}</span>${t.label}</button>`).join('')}
      </nav>
    `;
    document.querySelectorAll('[data-tab]').forEach(b=>{
      b.addEventListener('click', ()=>{ activeTab = b.dataset.tab; render(); });
    });
    renderTab(document.getElementById('main'));
  }

  function renderTab(main){
    if(activeTab==='painel') return renderPainel(main);
    if(activeTab==='lancar') return renderLancar(main);
    if(activeTab==='graficos') return renderGraficos(main);
    if(activeTab==='calendario') return renderCalendario(main);
    if(activeTab==='relatorio') return renderRelatorio(main);
    if(activeTab==='config') return renderConfig(main);
  }

  /* ---------------- Jar SVG ---------------- */
  function jarSVG(pct, colorMain){
    pct = Math.max(0, Math.min(1, pct));
    const id = 'jar'+uid();
    const fillHeight = 78*pct;
    const fillY = 96 - fillHeight;
    return `
    <svg class="jar" width="72" height="100" viewBox="0 0 72 100">
      <defs>
        <clipPath id="clip-${id}">
          <path d="M14 20 L14 88 Q14 96 22 96 L50 96 Q58 96 58 88 L58 20 Z"/>
        </clipPath>
      </defs>
      <path d="M14 20 L14 88 Q14 96 22 96 L50 96 Q58 96 58 88 L58 20 Z" fill="#fff" stroke="var(--border)" stroke-width="2"/>
      <path d="M12 12 L60 12 Q62 12 62 14 L62 18 Q62 20 60 20 L12 20 Q10 20 10 18 L10 14 Q10 12 12 12 Z" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1.5"/>
      <g clip-path="url(#clip-${id})">
        <rect x="0" y="${fillY}" width="72" height="100" fill="${colorMain}" opacity="0.9"/>
        <g class="wave">
          <path d="M0 ${fillY} Q9 ${fillY-4} 18 ${fillY} T36 ${fillY} T54 ${fillY} T72 ${fillY} T90 ${fillY} T108 ${fillY} V100 H0 Z" fill="${colorMain}"/>
        </g>
      </g>
    </svg>`;
  }

  /* ---------------- Painel ---------------- */
  function renderPainel(main){
    const t = computeTotals();
    const g = activeGoal();
    const ym = todayISO().slice(0,7);
    const pctGoal = g && g.target>0 ? Math.min(1, t.meta/g.target) : 0;
    const hour = new Date().getHours();
    const greet = hour<12?'Bom dia':(hour<18?'Boa tarde':'Boa noite');
    const gastoMes = monthExpenses(ym).reduce((s,e)=>s+Number(e.amount||0),0);
    const media = avgSpendPerDay(ym);
    const streak = streakNoAzul();
    const insights = buildInsights();

    const recentes = [...state.incomeEntries.map(e=>({...e,kind:'in'})), ...state.expenseEntries.map(e=>({...e,kind:'out'}))]
      .sort((a,b)=> (a.date+a.id) < (b.date+b.id) ? 1 : -1).slice(0,6);

    main.innerHTML = `
      <h1 class="page-title">${greet}</h1>
      <div class="subtitle">Meta ativa: <b>${g?g.name:'—'}</b> · ${fmt(g?g.target:0)}</div>

      <div class="jars">
        ${jarSVG(pctGoal, 'var(--primary)')}
        <div class="jar-wrap-lbl"></div>
      </div>
      <div class="jars" style="margin-top:-14px;">
        <div class="jar-wrap"><div class="jar-label">Meta</div><div class="jar-value">${fmt(t.meta)}</div></div>
      </div>

      <div class="grid cols-2" style="margin-top:18px;">
        <div class="card">
          <h3>Saldo livre</h3>
          <div class="money ${t.livre<0?'neg':'pos'}">${fmt(t.livre)}</div>
        </div>
        <div class="card">
          <h3>Progresso da meta</h3>
          <div class="money">${(pctGoal*100).toFixed(1)}%</div>
          <div class="progress-outer"><div class="progress-inner" style="width:${(pctGoal*100).toFixed(1)}%"></div></div>
        </div>
        <div class="card">
          <h3>Média de gasto/dia</h3>
          <div class="money sm">${fmt(media)}</div>
        </div>
        <div class="card">
          <h3>Dias seguidos no azul</h3>
          <div class="money sm">${streak}</div>
        </div>
      </div>

      <div class="grid cols-2" style="margin-top:14px;">
        <div class="card"><h3>Reserva</h3><div class="money sm">${fmt(t.reserva)}</div></div>
        <div class="card"><h3>Total geral</h3><div class="money sm">${fmt(t.total)}</div></div>
      </div>

      <div class="card" style="margin-top:18px;">
        <h3>Este mês · categorias</h3>
        ${state.categories.map(c=>{
          const spent = categorySpent(c.id, ym);
          const pct = c.cap>0 ? Math.min(1, spent/c.cap) : 0;
          const cls = pct>=1?'over':(pct>=0.8?'warn':'');
          return `<div class="list-item">
            <div>
              <div><b>${c.name}</b></div>
              <div class="meta">${fmt(spent)} ${c.cap>0? '/ '+fmt(c.cap):''}</div>
            </div>
            <div style="width:100px;">
              ${c.cap>0?`<div class="progress-outer"><div class="progress-inner ${cls}" style="width:${(pct*100).toFixed(0)}%"></div></div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Sugestões</h3>
        ${insights.map(i=>`<div class="insight"><span class="dot">${i.icon}</span><span>${i.text}</span></div>`).join('')}
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Lançamentos recentes</h3>
        ${recentes.length===0? '<div class="empty">Nenhum lançamento ainda.</div>' :
          recentes.map(e=>{
            if(e.kind==='in'){
              return `<div class="list-item"><div><b>Dia trabalhado</b><div class="meta">${e.date}</div></div><div class="money sm pos">+${fmt(e.amount)}</div></div>`;
            }
            const cat = state.categories.find(c=>c.id===e.category);
            return `<div class="list-item"><div><b>${cat?cat.name:'Gasto'}</b><div class="meta">${e.date}${e.note? ' · '+e.note:''}</div></div><div class="money sm neg">-${fmt(e.amount)}</div></div>`;
          }).join('')
        }
      </div>
    `;
  }

  /* ---------------- Lançar ---------------- */
  function renderLancar(main){
    main.innerHTML = `
      <h1 class="page-title">Lançar</h1>
      <div class="subtitle">Registre um dia trabalhado ou um gasto.</div>

      <div class="card">
        <h3>Dia trabalhado</h3>
        <label class="field">Valor recebido (R$)</label>
        <input type="number" id="incAmount" step="0.01" placeholder="0,00" />
        <label class="field">Data</label>
        <input type="date" id="incDate" value="${todayISO()}" />
        <div class="hint" id="splitPreview"></div>
        <button class="btn block" style="margin-top:16px;" id="btnSaveIncome">+ Registrar</button>
      </div>

      <div class="card" style="margin-top:16px;">
        <h3>Registrar gasto</h3>
        <label class="field">Categoria</label>
        <select id="expCategory">
          ${state.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
        <label class="field">Pago com</label>
        <select id="expPayment">
          ${state.paymentMethods.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <label class="field">Valor (R$)</label>
        <input type="number" id="expAmount" step="0.01" placeholder="0,00" />
        <label class="field">Nota (opcional)</label>
        <input type="text" id="expNote" placeholder="ex: corrida pro trabalho" />
        <label class="field">Data</label>
        <input type="date" id="expDate" value="${todayISO()}" />
        <button class="btn block" style="margin-top:16px;" id="btnSaveExpense">Salvar gasto</button>
      </div>
    `;

    function updatePreview(){
      const v = Number(document.getElementById('incAmount').value)||0;
      const p = state.potePercents;
      const meta = v*(p.meta/100), reserva = v*(p.reserva/100), livre = v*(p.livre/100);
      document.getElementById('splitPreview').textContent =
        `Divisão automática: Meta ${fmt(meta)} · Reserva ${fmt(reserva)} · Livre ${fmt(livre)}`;
    }
    document.getElementById('incAmount').addEventListener('input', updatePreview);
    updatePreview();

    document.getElementById('btnSaveIncome').addEventListener('click', ()=>{
      const amount = Number(document.getElementById('incAmount').value);
      const date = document.getElementById('incDate').value;
      if(!amount || amount<=0){ showToast('Informe um valor válido.'); return; }
      const p = state.potePercents;
      state.incomeEntries.push({
        id: uid(), amount, date,
        split: { meta: amount*(p.meta/100), reserva: amount*(p.reserva/100), livre: amount*(p.livre/100) }
      });
      scheduleSave();
      showToast('Dia trabalhado registrado.');
      render();
      activeTab='lancar'; // manter na aba
    });

    document.getElementById('btnSaveExpense').addEventListener('click', ()=>{
      const amount = Number(document.getElementById('expAmount').value);
      if(!amount || amount<=0){ showToast('Informe um valor válido.'); return; }
      state.expenseEntries.push({
        id: uid(),
        category: document.getElementById('expCategory').value,
        payment: document.getElementById('expPayment').value,
        amount,
        note: document.getElementById('expNote').value,
        date: document.getElementById('expDate').value
      });
      scheduleSave();
      showToast('Gasto salvo.');
      activeTab='lancar';
      render();
    });
  }

  /* ---------------- Gráficos ---------------- */
  function renderGraficos(main){
    const data = last14DaysData();
    const maxAbs = Math.max(1, ...data.map(d=>Math.abs(d.net)));
    const t = computeTotals();

    main.innerHTML = `
      <h1 class="page-title">Gráficos</h1>
      <div class="subtitle">Saldo livre do dia — últimos 14 dias.</div>
      <div class="card">
        <h3>Últimos 14 dias</h3>
        ${data.every(d=>d.net===0) ? '<div class="empty">Sem dados ainda.</div>' : `
        <div class="bars">
          ${data.map(d=>{
            const h = Math.max(2, Math.round((Math.abs(d.net)/maxAbs)*100));
            return `<div class="bar">
              <div class="fill ${d.net<0?'neg':''}" style="height:${h}%"></div>
              <div class="lbl">${d.date.slice(8,10)}/${d.date.slice(5,7)}</div>
            </div>`;
          }).join('')}
        </div>`}
        <div class="hint">Barra abaixo da linha = você gastou mais do que a parte livre daquele dia.</div>
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Total geral acumulado</h3>
        <div class="row-between">
          <div>Moto/Meta: <b>${fmt(t.meta)}</b></div>
          <div>Reserva: <b>${fmt(t.reserva)}</b></div>
          <div>Livre: <b>${fmt(t.livre)}</b></div>
        </div>
      </div>
    `;
  }

  /* ---------------- Calendário ---------------- */
  let calMonthOffset = 0;
  function renderCalendario(main){
    const base = new Date();
    base.setMonth(base.getMonth()+calMonthOffset);
    const year = base.getFullYear(), month = base.getMonth();
    const first = new Date(year, month, 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const monthLabel = base.toLocaleDateString('pt-BR',{month:'short', year:'2-digit'}).toUpperCase();
    const todayStr = todayISO();

    let cells = '';
    for(let i=0;i<startDow;i++) cells += `<div class="cal-day empty-cell"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const inc = state.incomeEntries.filter(e=>e.date===iso).reduce((s,e)=>s+(e.split.livre||0),0);
      const out = state.expenseEntries.filter(e=>e.date===iso).reduce((s,e)=>s+Number(e.amount||0),0);
      const hasData = state.incomeEntries.some(e=>e.date===iso) || state.expenseEntries.some(e=>e.date===iso);
      let cls = '';
      if(iso===todayStr) cls += ' today';
      if(hasData){ cls += (inc-out)>=0 ? ' profit' : ' loss'; }
      cells += `<div class="cal-day${cls}">${d}</div>`;
    }

    main.innerHTML = `
      <h1 class="page-title">Calendário</h1>
      <div class="card">
        <div class="row-between">
          <button class="btn secondary small" id="prevMonth">‹</button>
          <b>${monthLabel}</b>
          <button class="btn secondary small" id="nextMonth">›</button>
        </div>
        <div class="cal-grid" style="margin-top:14px;">
          <div class="cal-dow">D</div><div class="cal-dow">S</div><div class="cal-dow">T</div>
          <div class="cal-dow">Q</div><div class="cal-dow">Q</div><div class="cal-dow">S</div><div class="cal-dow">S</div>
          ${cells}
        </div>
        <div class="legend">
          <span><span class="swatch" style="background:var(--primary)"></span>Lucro</span>
          <span><span class="swatch" style="background:var(--danger)"></span>Prejuízo</span>
          <span><span class="swatch" style="background:var(--warning)"></span>Hoje</span>
          <span><span class="swatch" style="background:var(--surface-2)"></span>Sem lançamento</span>
        </div>
      </div>
    `;
    document.getElementById('prevMonth').addEventListener('click', ()=>{ calMonthOffset--; renderCalendario(main); });
    document.getElementById('nextMonth').addEventListener('click', ()=>{ calMonthOffset++; renderCalendario(main); });
  }

  /* ---------------- Relatório ---------------- */
  function buildReportText(){
    const ym = todayISO().slice(0,7);
    const t = computeTotals();
    const g = activeGoal();
    const incs = monthIncome(ym);
    const exps = monthExpenses(ym);
    const gastoMes = exps.reduce((s,e)=>s+Number(e.amount||0),0);
    const rendaMes = incs.reduce((s,e)=>s+Number(e.amount||0),0);
    const [ano,mes] = ym.split('-');
    const nomesMes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    let txt = `RELATÓRIO FINANCEIRO — ${nomesMes[Number(mes)-1].toUpperCase()} DE ${ano}\n`;
    txt += '-'.repeat(44) + '\n\n';
    txt += `Dias trabalhados no mês: ${new Set(incs.map(e=>e.date)).size}\n`;
    txt += `Renda do mês: ${fmt(rendaMes)}\n`;
    txt += `Total gasto no mês: ${fmt(gastoMes)}\n\n`;
    txt += `SALDOS ATUAIS\n`;
    txt += `- ${g?g.name:'Meta'}: ${fmt(t.meta)} de ${fmt(g?g.target:0)} (${g&&g.target>0?((t.meta/g.target)*100).toFixed(1):'0.0'}%)\n`;
    txt += `- Reserva: ${fmt(t.reserva)}\n`;
    txt += `- Dinheiro livre: ${fmt(t.livre)}\n`;
    txt += `- TOTAL GERAL: ${fmt(t.total)}\n\n`;
    txt += `GASTOS POR CATEGORIA (mês)\n`;
    state.categories.forEach(c=>{
      const spent = categorySpent(c.id, ym);
      txt += `- ${c.name}: ${fmt(spent)}${c.cap>0? ' / teto '+fmt(c.cap):''}\n`;
    });
    txt += `\nSUGESTÕES\n`;
    buildInsights().forEach(i=>{ txt += `- ${i.text}\n`; });
    return txt;
  }

  function renderRelatorio(main){
    main.innerHTML = `
      <h1 class="page-title">Relatório</h1>
      <div class="subtitle">Resumo do mês, pronto pra compartilhar.</div>
      <pre class="report" id="reportText">${buildReportText()}</pre>
      <button class="btn block" id="btnCopyReport" style="margin-top:14px;">⧉ Copiar relatório pra enviar</button>
    `;
    document.getElementById('btnCopyReport').addEventListener('click', async ()=>{
      const text = buildReportText();
      try{
        await navigator.clipboard.writeText(text);
        showToast('Relatório copiado.');
      }catch(e){
        showToast('Não consegui copiar automaticamente — selecione o texto manualmente.');
      }
    });
  }

  /* ---------------- Configurações ---------------- */
  function renderConfig(main){
    const p = state.potePercents;
    main.innerHTML = `
      <h1 class="page-title">Configurações</h1>
      <div class="subtitle">Tudo aqui é editável — nada fica travado no código.</div>

      <div class="card">
        <h3>Metas</h3>
        <table class="cfg" id="goalsTable">
          <tr><th>Nome</th><th>Valor alvo</th><th>Ativa</th><th></th></tr>
          ${state.goals.map(g=>`
            <tr data-id="${g.id}">
              <td><input type="text" class="g-name" value="${g.name}"/></td>
              <td><input type="number" class="g-target" value="${g.target}"/></td>
              <td><input type="radio" name="activeGoal" class="g-active" ${state.activeGoalId===g.id?'checked':''}/></td>
              <td><button class="icon-btn g-del">✕</button></td>
            </tr>`).join('')}
        </table>
        <button class="btn secondary small add-row" id="addGoal">+ Nova meta</button>
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Divisão automática da renda (%)</h3>
        <div class="grid cols-3">
          <div><label class="field">Meta</label><input type="number" id="pctMeta" value="${p.meta}"/></div>
          <div><label class="field">Reserva</label><input type="number" id="pctReserva" value="${p.reserva}"/></div>
          <div><label class="field">Livre</label><input type="number" id="pctLivre" value="${p.livre}"/></div>
        </div>
        <div class="hint" id="pctHint"></div>
        <button class="btn secondary" style="margin-top:12px;" id="savePct">Salvar percentuais</button>
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Categorias e tetos</h3>
        <table class="cfg" id="catTable">
          <tr><th>Categoria</th><th>Teto mensal (0 = sem teto)</th><th></th></tr>
          ${state.categories.map(c=>`
            <tr data-id="${c.id}">
              <td><input type="text" class="c-name" value="${c.name}"/></td>
              <td><input type="number" class="c-cap" value="${c.cap}"/></td>
              <td><button class="icon-btn c-del">✕</button></td>
            </tr>`).join('')}
        </table>
        <button class="btn secondary small add-row" id="addCat">+ Nova categoria</button>
        <button class="btn small add-row" id="saveCats" style="margin-left:8px;">Salvar categorias</button>
      </div>

      <div class="card" style="margin-top:14px;">
        <h3>Formas de pagamento</h3>
        <table class="cfg" id="payTable">
          <tr>${state.paymentMethods.map((p,i)=>`<th></th>`).join('')}</tr>
          <tr>
            ${state.paymentMethods.map((p,i)=>`<td><input type="text" class="p-name" data-i="${i}" value="${p}"/></td>`).join('')}
          </tr>
        </table>
        <button class="btn secondary small add-row" id="addPay">+ Forma de pagamento</button>
        <button class="btn small add-row" id="savePay" style="margin-left:8px;">Salvar</button>
      </div>

      <div class="card" style="margin-top:14px;border-color:var(--danger);">
        <h3 style="color:var(--danger);">Zona de risco</h3>
        <button class="btn danger" id="resetAll">Apagar todos os dados</button>
      </div>
    `;

    function updatePctHint(){
      const m = Number(document.getElementById('pctMeta').value)||0;
      const r = Number(document.getElementById('pctReserva').value)||0;
      const l = Number(document.getElementById('pctLivre').value)||0;
      const sum = m+r+l;
      const hint = document.getElementById('pctHint');
      hint.textContent = `Soma atual: ${sum}%` + (sum!==100 ? ' — precisa somar 100%.' : ' ✓');
      hint.style.color = sum!==100 ? 'var(--danger)' : 'var(--muted)';
    }
    ['pctMeta','pctReserva','pctLivre'].forEach(id=>document.getElementById(id).addEventListener('input', updatePctHint));
    updatePctHint();

    document.getElementById('addGoal').addEventListener('click', ()=>{
      state.goals.push({id:uid(), name:'Nova meta', target:1000});
      scheduleSave(); renderConfig(main);
    });
    main.querySelectorAll('.g-del').forEach(btn=>btn.addEventListener('click', (ev)=>{
      const id = ev.target.closest('tr').dataset.id;
      if(state.goals.length<=1){ showToast('Mantenha ao menos uma meta.'); return; }
      state.goals = state.goals.filter(g=>g.id!==id);
      if(state.activeGoalId===id) state.activeGoalId = state.goals[0].id;
      scheduleSave(); renderConfig(main);
    }));
    main.querySelectorAll('#goalsTable tr[data-id]').forEach(tr=>{
      tr.querySelector('.g-name').addEventListener('change', e=>{
        const g = state.goals.find(x=>x.id===tr.dataset.id); g.name=e.target.value; scheduleSave();
      });
      tr.querySelector('.g-target').addEventListener('change', e=>{
        const g = state.goals.find(x=>x.id===tr.dataset.id); g.target=Number(e.target.value)||0; scheduleSave();
      });
      tr.querySelector('.g-active').addEventListener('change', ()=>{
        state.activeGoalId = tr.dataset.id; scheduleSave();
      });
    });

    document.getElementById('savePct').addEventListener('click', ()=>{
      const m = Number(document.getElementById('pctMeta').value)||0;
      const r = Number(document.getElementById('pctReserva').value)||0;
      const l = Number(document.getElementById('pctLivre').value)||0;
      if(m+r+l!==100){ showToast('Os percentuais precisam somar 100%.'); return; }
      state.potePercents = {meta:m, reserva:r, livre:l};
      scheduleSave(); showToast('Percentuais atualizados.');
    });

    document.getElementById('addCat').addEventListener('click', ()=>{
      state.categories.push({id:uid(), name:'Nova categoria', cap:0});
      scheduleSave(); renderConfig(main);
    });
    main.querySelectorAll('.c-del').forEach(btn=>btn.addEventListener('click', ev=>{
      const id = ev.target.closest('tr').dataset.id;
      state.categories = state.categories.filter(c=>c.id!==id);
      scheduleSave(); renderConfig(main);
    }));
    document.getElementById('saveCats').addEventListener('click', ()=>{
      main.querySelectorAll('#catTable tr[data-id]').forEach(tr=>{
        const c = state.categories.find(x=>x.id===tr.dataset.id);
        c.name = tr.querySelector('.c-name').value;
        c.cap = Number(tr.querySelector('.c-cap').value)||0;
      });
      scheduleSave(); showToast('Categorias salvas.');
    });

    document.getElementById('addPay').addEventListener('click', ()=>{
      state.paymentMethods.push('Nova forma');
      scheduleSave(); renderConfig(main);
    });
    document.getElementById('savePay').addEventListener('click', ()=>{
      const inputs = main.querySelectorAll('.p-name');
      const vals = Array.from(inputs).map(i=>i.value).filter(v=>v.trim()!=='');
      state.paymentMethods = vals;
      scheduleSave(); showToast('Formas de pagamento salvas.');
    });

    document.getElementById('resetAll').addEventListener('click', ()=>{
      if(confirm('Isso vai apagar todos os lançamentos, metas e configurações. Tem certeza?')){
        state = defaultState();
        scheduleSave(); showToast('Dados apagados.'); render();
      }
    });
  }

  loadState();

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
