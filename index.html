<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Finanças</title>
<!-- [Link do seu manifest.json e icons deve ser mantido] -->
<style>
  /* [Estilos mantidos para manter a aparência atual] */
  :root{ --bg:#FFFFFF; --surface:#F3FAF6; --primary:#1B7A43; --ink:#15271C; }
  body{ font-family: sans-serif; padding: 20px; }
  .card{ background:var(--surface); padding:16px; border-radius:14px; margin-bottom:16px; }
  .btn{ background:var(--primary); color:#fff; padding:10px; border-radius:8px; border:none; width:100%; }
  label{ display:block; margin: 10px 0 5px; font-weight:bold; }
  input, select{ width:100%; padding:8px; border-radius:8px; border:1px solid #ccc; }
</style>
</head>
<body>

<div id="app">
  <h1>Lançar Receitas</h1>

  <!-- 1.1 Diária do Free -->
  <div class="card">
    <h3>Diária do Free</h3>
    <label>Valor recebido (R$)</label>
    <input type="number" id="freeAmount" placeholder="0,00" />
    <label>Data</label>
    <input type="date" id="freeDate" />
    <label>Observação (opcional)</label>
    <input type="text" id="freeNote" />
    <button class="btn" style="margin-top:10px;" onclick="lancarFree()">Salvar Diária</button>
  </div>

  <!-- 1.2 Salário Mensal -->
  <div class="card">
    <h3>Salário Mensal</h3>
    <label>Valor do salário (R$)</label>
    <input type="number" id="salarioAmount" placeholder="0,00" />
    <label>Mês de referência</label>
    <input type="month" id="salarioMonth" />
    <label>Observação (opcional)</label>
    <input type="text" id="salarioNote" />
    <button class="btn" style="margin-top:10px;" onclick="lancarSalario()">Salvar Salário</button>
  </div>
</div>

<script>
  function lancarFree() {
    const data = {
      tipo: 'Free',
      valor: document.getElementById('freeAmount').value,
      data: document.getElementById('freeDate').value,
      obs: document.getElementById('freeNote').value
    };
    console.log('Lançando Free:', data);
    alert('Diária do Free salva com sucesso!');
  }

  function lancarSalario() {
    const data = {
      tipo: 'Salário',
      valor: document.getElementById('salarioAmount').value,
      mes: document.getElementById('salarioMonth').value,
      obs: document.getElementById('salarioNote').value
    };
    console.log('Lançando Salário:', data);
    alert('Salário mensal salvo com sucesso!');
  }
</script>

</body>
</html>
